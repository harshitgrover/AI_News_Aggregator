<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Scraper Test</title>
    <!-- Basic styling to make it look premium and modern -->
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; max-width: 800px; margin: 0 auto; }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 2rem; }
        .article { background: #1e293b; padding: 1.5rem; margin-bottom: 1.5rem; border-radius: 12px; border: 1px solid #334155; transition: transform 0.2s, border-color 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .article:hover { transform: translateY(-4px); border-color: #38bdf8; }
        .article h2 { margin-top: 0; color: #e2e8f0; font-size: 1.3rem; line-height: 1.4; }
        .article p { color: #94a3b8; line-height: 1.6; }
        .article a { display: inline-block; margin-top: 1rem; color: #38bdf8; text-decoration: none; font-weight: 600; padding: 0.5rem 1rem; background: rgba(56, 189, 248, 0.1); border-radius: 6px; transition: background 0.2s; }
        .article a:hover { background: rgba(56, 189, 248, 0.2); }
        .loading { text-align: center; color: #94a3b8; font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <h1>🚀 AI News Aggregator</h1>
    <div id="news-container">
        <p class="loading">Scraping the latest TechCrunch news...</p>
    </div>

    <script>
        // Standard Vanilla JS fetching data from our backend API!
        async function fetchNews() {
            try {
                const response = await fetch('/api/news');
                const result = await response.json();
                
                const container = document.getElementById('news-container');
                container.innerHTML = ''; // Clear the loading text
                
                // Loop through the data and render it
                result.data.forEach(article => {
                    const articleDiv = document.createElement('div');
                    articleDiv.className = 'article';
                    
                    articleDiv.innerHTML = `
                        <div style="display: inline-block; background: #38bdf8; color: #0f172a; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 8px;">
                            ${article.source_name}
                        </div>
                        <h2>${article.title}</h2>
                        <p>${article.summary}</p>
                        <a href="${article.link}" target="_blank">Read Full Article &rarr;</a>
                    `;
                    container.appendChild(articleDiv);
                });
            } catch (error) {
                console.error("Failed to fetch news:", error);
                document.getElementById('news-container').innerHTML = '<p>Failed to load news. Ensure backend is running.</p>';
            }
        }
        
        // Execute on load
        fetchNews();
    </script>
</body>
</html>
